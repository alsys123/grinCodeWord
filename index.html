<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Codeword Handwriting Puzzle V7</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      background: #f7f4ef; /* Warm background */
      padding: 20px;
    }

    .wrapper {
      background: #fffdf7; /* Soft cream */
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      width: 620px;
    }

    #alert {
      display: none;
      background: #d00000;
      color: white;
      padding: 10px;
      text-align: center;
      font-weight: bold;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 12px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(13, 40px);
      grid-auto-rows: 40px;
      gap: 3px;
      margin-bottom: 16px;
    }

    .cell {
      position: relative;
      width: 40px;
      height: 40px;
      border: 1px solid #c8c3b8;
      background: #fffdf7; /* Soft cream */
      overflow: hidden;
      touch-action: manipulation;
    }

    .cell.black {
      background: #1c1c1c; /* Softer black */
      border-color: #1c1c1c;
      pointer-events: none;
    }

    .number-label {
      position: absolute;
      top: 2px;
      left: 3px;
      font-size: 9px;
      color: #444;
      pointer-events: none;
      user-select: none;
    }

    canvas {
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: crosshair;
    }

    .letter {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 600;
      font-family: "Georgia", "Times New Roman", serif;
      color: #111;
      background: #fffdf7;
      user-select: none;
    }

    .letter.starter {
      color: #b00020;
    }

    .letter.wrong {
      color: red;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      text-align: center;
      font-weight: 500;
    }

    .key-grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(13, 40px);
      grid-auto-rows: 40px;
      gap: 3px;
    }

    #checkBtn {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      background: #0077cc;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
    }

    #checkBtn:hover {
      background: #005fa3;
    }

    .status {
      margin-top: 6px;
      font-size: 12px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <div id="alert">LETTER NOT RECOGNIZED — TRY AGAIN</div>

    <h1>Codeword Handwriting Puzzle</h1>

    <div id="grid" class="grid"></div>

    <div class="hint" id="hintText"></div>

    <div id="keyTop" class="key-grid"></div>
    <div id="keyBottom" class="key-grid"></div>

    <button id="checkBtn">Check Answers</button>

    <div class="status" id="status">
      Write a letter in any white square. Double‑tap a letter to clear it.
    </div>
  </div>

  <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>

  <script>
    const rows = 13;
    const cols = 13;
    const inactivityDelay = 1200; // Slightly faster recognition

    const gridEl = document.getElementById('grid');
    const keyTop = document.getElementById('keyTop');
    const keyBottom = document.getElementById('keyBottom');
    const statusEl = document.getElementById('status');
    const alertEl = document.getElementById('alert');
    const hintEl = document.getElementById('hintText');
    const checkBtn = document.getElementById('checkBtn');

    const gridNumbers = [
      [0,5,12,8,0,3,19,3,0,8,12,5,0],
      [7,0,21,0,14,0,9,0,14,0,21,0,7],
      [10,18,0,4,0,22,1,22,0,4,0,18,10],
      [0,0,16,0,11,0,6,0,11,0,16,0,0],
      [2,15,0,23,0,13,25,13,0,23,0,15,2],
      [9,0,20,0,17,0,24,0,17,0,20,0,9],
      [0,6,1,11,25,24,26,24,25,11,1,6,0],
      [9,0,20,0,17,0,24,0,17,0,20,0,9],
      [2,15,0,23,0,13,25,13,0,23,0,15,2],
      [0,0,16,0,11,0,6,0,11,0,16,0,0],
      [10,18,0,4,0,22,1,22,0,4,0,18,10],
      [7,0,21,0,14,0,9,0,14,0,21,0,7],
      [0,5,12,8,0,3,19,3,0,8,12,5,0]
    ];

    const solutionMap = {
      1:'E',2:'R',3:'O',4:'N',5:'S',6:'L',7:'C',8:'D',9:'I',10:'H',
      11:'T',12:'A',13:'U',14:'P',15:'M',16:'G',17:'Y',18:'B',19:'K',
      20:'F',21:'W',22:'V',23:'J',24:'Q',25:'X',26:'Z'
    };

    const hintPairs = [
      { number: 3, letter: "O" },
      { number: 19, letter: "K" }
    ];

    const cells = [];

    function showAlert() {
      alertEl.style.display = "block";
      alertEl.style.opacity = "1";
      setTimeout(() => {
        alertEl.style.transition = "opacity 0.8s";
        alertEl.style.opacity = "0";
        setTimeout(() => {
          alertEl.style.display = "none";
          alertEl.style.transition = "";
        }, 800);
      }, 2000);
    }

    function createCanvas() {
      const canvas = document.createElement('canvas');
      canvas.width = 100;
      canvas.height = 100;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fffdf7';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#000000';
      return { canvas, ctx };
    }

    function createCell(number) {
      const cell = document.createElement('div');
      cell.className = 'cell';

      const numberLabel = document.createElement('div');
      numberLabel.className = 'number-label';
      numberLabel.textContent = number;
      cell.appendChild(numberLabel);

      const { canvas, ctx } = createCanvas();
      cell.appendChild(canvas);

      const cellData = {
        number,
        cell,
        canvas,
        ctx,
        drawing: false,
        lastX: 0,
        lastY: 0,
        timer: null,
        recognized: false,
        lastTap: 0,
        starter: false
      };

      setupDrawing(cellData);
      setupDoubleTap(cellData);

      return cellData;
    }

    function createGrid() {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const num = gridNumbers[r][c];

          if (num === 0) {
            const black = document.createElement('div');
            black.className = 'cell black';
            gridEl.appendChild(black);
            continue;
          }

          const cd = createCell(num);
          gridEl.appendChild(cd.cell);
          cells.push(cd);
        }
      }

      applyStarters();
    }

    function applyStarters() {
      hintPairs.forEach(h => {
        const target = cells.find(cd => cd.number === h.number && !cd.starter);
        if (target) {
          placeLetter(target, h.letter, true);
          target.starter = true;
          target.recognized = true;
        }
      });

      hintEl.textContent = `Hints: ${hintPairs[0].number} = ${hintPairs[0].letter}   ${hintPairs[1].number} = ${hintPairs[1].letter}`;
    }

    function setupDoubleTap(cellData) {
      const handler = () => {
        const now = Date.now();
        if (now - cellData.lastTap < 280) {
          if (cellData.recognized && !cellData.starter) {
            clearCell(cellData);
          }
        }
        cellData.lastTap = now;
      };

      cellData.cell.addEventListener('touchend', handler);
      cellData.cell.addEventListener('click', handler);
    }

    function clearCell(cellData) {
      const { number, cell } = cellData;
      cell.innerHTML = '';

      const numberLabel = document.createElement('div');
      numberLabel.className = 'number-label';
      numberLabel.textContent = number;
      cell.appendChild(numberLabel);

      const { canvas, ctx } = createCanvas();
      cell.appendChild(canvas);

      cellData.canvas = canvas;
      cellData.ctx = ctx;
      cellData.recognized = false;
      cellData.starter = false;

      setupDrawing(cellData);
      setupDoubleTap(cellData);
    }

    function getPos(canvas, evt) {
      const rect = canvas.getBoundingClientRect();
      const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
      const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
      return {
        x: (clientX - rect.left) * (canvas.width / rect.width),
        y: (clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function setupDrawing(cellData) {
      const { canvas, ctx } = cellData;

      const start = (e) => {
        if (cellData.recognized) return;
        e.preventDefault();
        cellData.drawing = true;
        const pos = getPos(canvas, e);
        cellData.lastX = pos.x;
        cellData.lastY = pos.y;
        clearTimeout(cellData.timer);
      };

      const move = (e) => {
        if (!cellData.drawing || cellData.recognized) return;
        e.preventDefault();
        const pos = getPos(canvas, e);
        ctx.beginPath();
        ctx.moveTo(cellData.lastX, cellData.lastY);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        cellData.lastX = pos.x;
        cellData.lastY = pos.y;
      };

      const end = () => {
        if (!cellData.drawing) return;
        cellData.drawing = false;
        clearTimeout(cellData.timer);
        cellData.timer = setTimeout(() => recognizeCell(cellData), inactivityDelay);
      };

      canvas.onmousedown = start;
      canvas.onmousemove = move;
      window.addEventListener('mouseup', end);

      canvas.ontouchstart = start;
      canvas.ontouchmove = move;
      window.addEventListener('touchend', end);
      window.addEventListener('touchcancel', end);
    }

    async function recognizeCell(cellData) {
      if (cellData.recognized) return;

      const { canvas } = cellData;
      const ctx = canvas.getContext('2d');
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);

      let hasInk = false;
      for (let i = 0; i < img.data.length; i += 4) {
        if (img.data[i] < 250 || img.data[i+1] < 250 || img.data[i+2] < 250) {
          hasInk = true;
          break;
        }
      }
      if (!hasInk) return;

      statusEl.textContent = 'Recognizing letter...';

      try {
        const result = await Tesseract.recognize(canvas, 'eng', {
          tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz'
        });

        let text = (result.data.text || '').trim();
        if (text.length > 1) text = text[0];
        if (!text) {
          showAlert();
          statusEl.textContent = 'Could not recognize.';
          return;
        }

        const letter = text.toUpperCase();
        if (!/^[A-Z]$/.test(letter)) {
          showAlert();
          statusEl.textContent = 'Only letters allowed.';
          return;
        }

        placeLetter(cellData, letter, false);
        cellData.recognized = true;
        statusEl.textContent = `Recognized: "${letter}"`;
      } catch (err) {
        console.error(err);
        showAlert();
        statusEl.textContent = 'Error during recognition.';
      }
    }

    function placeLetter(cellData, letter, isStarter) {
      const { cell, number } = cellData;
      cell.innerHTML = '';

      const numberLabel = document.createElement('div');
      numberLabel.className = 'number-label';
      numberLabel.textContent = number;
      cell.appendChild(numberLabel);

      const letterDiv = document.createElement('div');
      letterDiv.className = 'letter';
      if (isStarter) letterDiv.classList.add('starter');
      letterDiv.textContent = letter;
      cell.appendChild(letterDiv);
    }

    function createKeyRows() {
      for (let i = 1; i <= 13; i++) {
        const cd = createCell(i);
        keyTop.appendChild(cd.cell);
      }
      for (let i = 14; i <= 26; i++) {
        const cd = createCell(i);
        keyBottom.appendChild(cd.cell);
      }
    }

    function checkAnswers() {
      cells.forEach(cd => {
        if (!cd.recognized || cd.starter) return;

        const letterDiv = cd.cell.querySelector('.letter');
        if (!letterDiv) return;

        const correct = solutionMap[cd.number];
        const typed = letterDiv.textContent.toUpperCase();

        if (typed !== correct) {
          letterDiv.classList.add('wrong');
        } else {
          letterDiv.classList.remove('wrong');
        }
      });
    }

    checkBtn.addEventListener('click', checkAnswers);

    createGrid();
    createKeyRows();
  </script>
</body>
</html>
